version: "2"
sql:
  - schema: "migrations/"
    queries: "internal/repository/queries/"
    gen:
      go:
        package: "db"
        out: "internal/repository/db"
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        sql_package: "pgx/v5"
